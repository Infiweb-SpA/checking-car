<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Taller Araucanía</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- BARRA DE NAVEGACIÓN SUPERIOR -->
    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            
            <!-- Nombre de la App -->
            <div class="font-bold text-lg flex items-center gap-2">
                <span>🔧</span>
                <span>Mi Taller</span>
            </div>
            
            <!-- Botón de Cerrar Sesión (Solo visible si hay sesión iniciada) -->
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('auth.logout') }}" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold py-2 px-3 rounded shadow transition">
                Cerrar Sesión
            </a>
            {% endif %}

        </div>
    </nav>

    <!-- CONTENIDO DINÁMICO (Cajas blancas) -->
    <div class="max-w-md mx-auto mt-4 mb-10 px-4">
        <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
            {% block content %}{% endblock %}
        </div>
    </div>

</body>
</html>
