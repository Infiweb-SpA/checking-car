{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('taller.dashboard') }}" class="text-blue-500 hover:underline">← Volver al Panel</a>
</div>

<h2 class="text-2xl font-bold mb-6 text-gray-800">Ingresar Nuevo Vehículo</h2>

<form method="POST" action="" enctype="multipart/form-data"> <!-- ENCTYPE ES VITAL -->
    
    <!-- Info del Cliente -->
    <div class="bg-gray-50 p-4 rounded mb-4 border">
        <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">1. Datos del Cliente</h3>
        <div class="mb-3">
            <label class="block text-sm font-bold mb-1">Nombre del Dueño</label>
            <input type="text" name="nombre_cliente" placeholder="Ej: Juan Pérez" class="border rounded w-full py-2 px-3" required>
        </div>
        <div>
            <label class="block text-sm font-bold mb-1">WhatsApp</label>
            <input type="number" name="telefono" placeholder="56912345678" class="border rounded w-full py-2 px-3" required>
        </div>
    </div>

    <!-- Info del Vehículo -->
    <div class="bg-gray-50 p-4 rounded mb-4 border">
        <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">2. Datos del Vehículo</h3>
        <div class="grid grid-cols-2 gap-2 mb-3">
            <div>
                <label class="block text-sm font-bold mb-1">Patente</label>
                <input type="text" name="patente" placeholder="AB-CD-12" class="border rounded w-full py-2 px-3 uppercase" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Tipo</label>
                <select name="tipo_vehiculo" class="border rounded w-full py-2 px-3 bg-white" required>
                    <option value="Auto">Auto</option>
                    <option value="Camioneta">Camioneta</option>
                    <option value="Motocicleta">Motocicleta</option>
                    <option value="Furgón">Furgón</option>
                    <option value="Camión">Camión</option>
                    <option value="Bus">Bus</option>
                </select>
            </div>
        </div>
        <div>
            <label class="block text-sm font-bold mb-1">Marca / Modelo</label>
            <input type="text" name="marca_vehiculo" placeholder="Ej: Toyota Hilux" class="border rounded w-full py-2 px-3" required>
        </div>
    </div>

    <!-- Info del Trabajo y Foto -->
    <div class="bg-gray-50 p-4 rounded mb-6 border">
        <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">3. Diagnóstico y Presupuesto</h3>
        
        <!-- ESTE ES EL BOTÓN DE LA CÁMARA -->
                <!-- ESTE ES EL BOTÓN DE LA CÁMARA ACTUALIZADO -->
        <div class="mb-3">
            <label class="block text-sm font-bold mb-1 text-blue-600">📸 Tomar o Subir Fotos (Puedes seleccionar varias)</label>
            <!-- Agregamos "multiple" y cambiamos el name a "imagenes" -->
            <input type="file" name="imagenes" accept="image/*" multiple class="border rounded w-full py-2 px-3 bg-white text-sm">
            <p class="text-xs text-gray-500 mt-1">Mantén presionado sobre una foto en tu galería para seleccionar varias.</p>
        </div>

        <div class="mb-3">
            <label class="block text-sm font-bold mb-1">Detalle a reparar</label>
            <textarea name="descripcion" rows="3" class="border rounded w-full py-2 px-3" required></textarea>
        </div>
        <div>
            <label class="block text-sm font-bold mb-1">Costo Total ($)</label>
            <input type="number" name="costo" placeholder="Ej: 45000" class="border rounded w-full py-2 px-3 font-bold text-lg text-green-700" required>
        </div>
    </div>

    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded shadow-lg text-lg">
        💾 Guardar Vehículo
    </button>
</form>
{% endblock %}
