{% extends "base.html" %}

{% block content %}
<div class="mb-4 flex items-center justify-between">
    <h2 class="text-2xl font-bold text-slate-800">✏️ Editar Vehículo</h2>
    <a href="{{ url_for('taller.dashboard') }}" class="text-slate-500 hover:text-slate-700 text-sm font-bold bg-slate-100 px-3 py-1 rounded-lg">Cancelar</a>
</div>

<form method="POST" action="">
    
    <!-- Info del Cliente -->
    <div class="bg-slate-50 p-4 rounded-xl mb-4 border border-slate-200">
        <h3 class="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">1. Datos del Cliente</h3>
        <div class="mb-3">
            <label class="block text-sm font-bold mb-1 text-slate-600">Nombre del Dueño</label>
            <input type="text" name="nombre_cliente" value="{{ trabajo.nombre_cliente }}" class="border border-slate-300 rounded-lg w-full py-2 px-3 focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
        <div>
            <label class="block text-sm font-bold mb-1 text-slate-600">WhatsApp</label>
            <input type="number" name="telefono" value="{{ trabajo.telefono_cliente }}" class="border border-slate-300 rounded-lg w-full py-2 px-3 focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
    </div>

    <!-- Info del Vehículo -->
    <div class="bg-slate-50 p-4 rounded-xl mb-4 border border-slate-200">
        <h3 class="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">2. Datos del Vehículo</h3>
        <div class="grid grid-cols-2 gap-2 mb-3">
            <div>
                <label class="block text-sm font-bold mb-1 text-slate-600">Patente</label>
                <input type="text" name="patente" value="{{ trabajo.patente }}" class="border border-slate-300 rounded-lg w-full py-2 px-3 uppercase focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1 text-slate-600">Tipo</label>
                <select name="tipo_vehiculo" class="border border-slate-300 rounded-lg w-full py-2 px-3 bg-white focus:ring-2 focus:ring-blue-500 outline-none" required>
                    <option value="Auto" {% if trabajo.tipo_vehiculo == 'Auto' %}selected{% endif %}>Auto</option>
                    <option value="Camioneta" {% if trabajo.tipo_vehiculo == 'Camioneta' %}selected{% endif %}>Camioneta</option>
                    <option value="Motocicleta" {% if trabajo.tipo_vehiculo == 'Motocicleta' %}selected{% endif %}>Motocicleta</option>
                    <option value="Furgón" {% if trabajo.tipo_vehiculo == 'Furgón' %}selected{% endif %}>Furgón</option>
                    <option value="Camión" {% if trabajo.tipo_vehiculo == 'Camión' %}selected{% endif %}>Camión</option>
                    <option value="Bus" {% if trabajo.tipo_vehiculo == 'Bus' %}selected{% endif %}>Bus</option>
                </select>
            </div>
        </div>
        <div>
            <label class="block text-sm font-bold mb-1 text-slate-600">Marca / Modelo</label>
            <input type="text" name="marca_vehiculo" value="{{ trabajo.marca_vehiculo }}" class="border border-slate-300 rounded-lg w-full py-2 px-3 focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
    </div>

    <!-- Info del Trabajo -->
    <div class="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-200">
        <h3 class="font-bold text-slate-700 mb-2 border-b border-slate-200 pb-1">3. Diagnóstico y Presupuesto</h3>
        
        <div class="mb-3">
            <label class="block text-sm font-bold mb-1 text-slate-600">Detalle a reparar</label>
            <textarea name="descripcion" rows="4" class="border border-slate-300 rounded-lg w-full py-2 px-3 focus:ring-2 focus:ring-blue-500 outline-none" required>{{ trabajo.descripcion }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-bold mb-1 text-slate-600">Costo Total ($)</label>
            <input type="number" name="costo" value="{{ trabajo.total_costo }}" class="border border-slate-300 rounded-lg w-full py-2 px-3 font-bold text-lg text-blue-700 focus:ring-2 focus:ring-blue-500 outline-none" required>
        </div>
    </div>

    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-xl shadow-lg text-lg transition-transform active:scale-95">
        💾 Actualizar Datos
    </button>
</form>
{% endblock %}
